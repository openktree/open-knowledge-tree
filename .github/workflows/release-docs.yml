# Builds and pushes the okt-docs nginx Docker image to GHCR on every
# `docs-v*` tag push from release-please. This is the self-hostable
# fallback for the Docusaurus site; the canonical public docs are
# served by Cloudflare Pages (see docs-cloudflare.yml). linux/amd64
# only for now. Also tags `:latest`.
name: release-docs

on:
  push:
    tags: ['docs-v*']

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/openktree/docs

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches service
        run: scripts/release/verify-tag.sh docs

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag from git tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#docs-v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: docs
          file: docs/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max