# Builds and pushes the okt-api Docker image to GHCR on every
# `api-v*` tag push from release-please, then deploys it to the
# `okt-api-dev` Fly app (automatic dev deploy).
#
# linux/amd64 only for now. Also tags `:latest`. The Dockerfile does
# the CGo compile (go-fitz / MuPDF) inside Alpine.
#
# Prod deploys are manual via deploy-prod.yml (workflow_dispatch),
# which pulls a specific versioned image from GHCR and deploys it to
# the `okt-api-prod` Fly app.
name: release-api

on:
  push:
    tags: ['api-v*']

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/openktree/api
  FLY_APP: okt-api-dev

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches service
        run: scripts/release/verify-tag.sh api

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag from git tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#api-v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.FLY_DEPLOY_ENABLED == 'true' }}
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy ${{ env.VERSION }} to ${{ env.FLY_APP }}
        working-directory: backend
        run: |
          flyctl deploy --app "$FLY_APP" \
            --image "$IMAGE:latest" \
            --strategy rolling \
            --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}