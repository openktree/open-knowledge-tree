# Builds and pushes the okt-api Docker image to GHCR on every
# `api-v*` tag push from release-please. linux/amd64 only for now.
# Also tags `:latest`. The Dockerfile does the CGo compile inside
# Alpine (go-fitz / MuPDF); GoReleaser only orchestrates docker buildx.
name: release-api

on:
  push:
    tags: ['api-v*']

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches service
        run: scripts/release/verify-tag.sh api

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          workdir: backend
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}