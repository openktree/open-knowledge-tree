# Builds and pushes the okt-registry Docker image to GHCR on every
# `registry-v*` tag push from release-please, then deploys it to the
# `okt-registry-dev` Fly app (automatic dev deploy).
#
# linux/amd64 only for now. Also tags `:latest`. The Dockerfile builds
# the pure-Go registry binary.
#
# Prod deploys are manual via deploy-prod.yml (workflow_dispatch),
# which pulls a specific versioned image from GHCR and deploys it to
# the `okt-registry-prod` Fly app.
name: release-registry

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. registry-v1.1.0)'
        required: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/openktree/registry
  FLY_APP: okt-registry-dev

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches service
        run: scripts/release/verify-tag.sh registry
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag from release tag
        id: tag
        run: echo "version=${TAG#registry-v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - uses: docker/build-push-action@v6
        with:
          context: registry
          file: registry/Dockerfile.registry
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.FLY_DEPLOY_ENABLED == 'true' }}
    env:
      VERSION: ${{ github.event.release.tag_name || github.event.inputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy ${{ env.VERSION }} to ${{ env.FLY_APP }}
        working-directory: registry
        run: |
          flyctl deploy --app "$FLY_APP" \
            --image "$IMAGE:latest" \
            --strategy rolling \
            --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}