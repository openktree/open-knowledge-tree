# Fly.io config for the OKT Knowledge Registry (prod app: okt-registry-prod).
#
# Prod deployment: Postgres metadata (okt-registry-prod-db cluster)
# + Cloudflare R2 object storage. All secrets are set as Fly secrets,
# never in this file. Auth is closed in prod.
#
# Secrets set via `flyctl secrets set -a okt-registry-prod`:
#   REGISTRY_DATABASE_URL=postgres://postgres:<pw>@okt-registry-prod-db.flycast:5432
#   REGISTRY_DATABASE_DRIVER=postgres
#   REGISTRY_STORAGE_BACKEND=s3
#   REGISTRY_S3_ENDPOINT=https://<account>.r2.cloudflarestorage.com
#   REGISTRY_S3_BUCKET=okt-registry-prod
#   REGISTRY_S3_ACCESS_KEY=... REGISTRY_S3_SECRET_KEY=...
#   REGISTRY_AUTH_JWT_SECRET=<strong-random>
#   REGISTRY_AUTH_AUTH_MODE=closed
#
# The Postgres cluster (okt-registry-prod-db) was provisioned separately
# via `flyctl postgres create`. It runs in the same org (okt-1) and is
# reachable over the Fly private network at *.flycast:5432.
app = 'okt-registry-prod'
primary_region = 'iad'

[build]
dockerfile = 'Dockerfile.registry'

[env]
# All runtime config (database, storage, auth) is set via Fly secrets.

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0

[http_service.concurrency]
type = 'requests'
hard_limit = 250
soft_limit = 200

[[vm]]
size = 'shared-cpu-2x'
memory = '2048mb'

[[mounts]]
source = 'registry_data'
destination = '/data'