# GoReleaser config for the OKT Knowledge Registry (registry/).
#
# The registry binary is pure Go (CGO_ENABLED=0) so GoReleaser's
# native cross-compile path could be used, but we keep a single
# pipeline shape with the backend: the Dockerfile builds the binary
# and the `dockers` section uses buildx to build + push the final
# image to GHCR. linux/amd64 only for now.
version: 2

project-name: okt-registry

before:
  hooks:
    - go mod tidy

builds:
  - skip: true

dockers:
  - use: buildx
    goarch: amd64
    dockerfile: Dockerfile.registry
    image_templates:
      - "ghcr.io/openktree/registry:{{ .Tag }}"
      - "ghcr.io/openktree/registry:latest"
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
      - "--label=org.opencontainers.image.version={{.Tag}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--platform=linux/amd64"

release:
  disable: true  # release-please owns the GitHub Release; GoReleaser only ships images

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

archives:
  - format: binary
    builds_info:
      group: root
      owner: root

source:
  enabled: false