# Fly.io config for the OKT Knowledge Registry (dev app: okt-registry-dev).
#
# This file is a template. Real env values (S3 secrets) are set via
# `flyctl secrets set` on the Fly app, NOT in this file. Deploy
# targets the prebuilt image from GHCR (ghcr.io/openktree/registry:<tag>).
#
# Fly apps to create:
#   flyctl apps create okt-registry-dev
#   flyctl secrets set -a okt-registry-dev \
#     REGISTRY_DATABASE_DRIVER=sqlite REGISTRY_DATABASE_URL=/data/registry.db \
#     REGISTRY_STORAGE_BACKEND=s3 REGISTRY_S3_ENDPOINT=... \
#     REGISTRY_S3_ACCESS_KEY=... REGISTRY_S3_SECRET_KEY=...
#
# For prod, create a separate app (okt-registry-prod) with prod env.
app = 'okt-registry-dev'
primary_region = 'iad'

[build]
image = 'ghcr.io/openktree/registry:latest'

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = false
auto_start_machines = false
min_machines_running = 1

[http_service.concurrency]
type = 'requests'
hard_limit = 250
soft_limit = 200

[[vm]]
size = 'shared-cpu-1x'
memory = '512mb'

[mounts]
source = 'registry_data'
destination = '/data'