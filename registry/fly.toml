# Fly.io config for the OKT Knowledge Registry (dev app: okt-registry-dev).
#
# Dev deployment: sqlite metadata + Cloudflare R2 object storage.
# R2 credentials are set as Fly secrets (not in this file) so they
# never land in version control.
#
# Secrets set via `flyctl secrets set -a okt-registry-dev`:
#   REGISTRY_STORAGE_BACKEND=s3
#   REGISTRY_S3_ENDPOINT=https://<account>.r2.cloudflarestorage.com
#   REGISTRY_S3_BUCKET=okt-registry-dev
#   REGISTRY_S3_ACCESS_KEY=... REGISTRY_S3_SECRET_KEY=...
#   REGISTRY_AUTH_JWT_SECRET=<random>
app = 'okt-registry-dev'
primary_region = 'iad'

[build]
dockerfile = 'Dockerfile.registry'

[env]
REGISTRY_DATABASE_DRIVER = 'sqlite'
REGISTRY_DATABASE_URL = '/data/registry.db'
REGISTRY_STORAGE_BACKEND = 'filesystem'
REGISTRY_STORAGE_FILESYSTEM_ROOT = '/data/files'
REGISTRY_AUTH_AUTH_MODE = 'open'

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = false
auto_start_machines = false
min_machines_running = 1

[http_service.concurrency]
type = 'requests'
hard_limit = 250
soft_limit = 200

[[vm]]
size = 'shared-cpu-1x'
memory = '256mb'

[[mounts]]
source = 'registry_data'
destination = '/data'