root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # `entrypoint` replaces the deprecated `bin`+`args_bin` pair from
  # air v1.65+. The build itself still lives in `cmd` below; `entrypoint`
  # is just the binary (relative to `root`, or on $PATH if it has no
  # slash) plus its default arguments. Equivalent to the old:
  #   bin      = "./tmp/main"
  #   args_bin = ["--mode=api"]
  # Keep this in sync with Dockerfile.dev (which uses --mode=api).
  entrypoint = ["./tmp/main", "--mode=api"]
  # extlib + pkgconfig tell go-fitz to link against the
  # system mupdf (via `pkg-config mupdf`) rather than
  # its own glibc-built static archives. The vendored
  # archives are not safe to link on musl/Alpine: they
  # reference __*_chk fortified symbols that musl does
  # not provide, producing a "undefined reference to
  # __snprintf_chk" link error. Keep these tags in sync
  # with the build command in the prod Dockerfile.
  cmd = "go build -tags \"nocgo\" -o ./tmp/main ./cmd/app/"
  delay = 500
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "data", "e2e"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
